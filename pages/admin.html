<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Hub | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="app" data-page="admin"></div>

    <script>
      (function loadApp() {
        var appBundle = document.createElement('script');
        appBundle.type = 'module';
        appBundle.src = '/assets/dist/react-app.bundle.js';
        appBundle.onerror = function () {
          var react = document.createElement('script');
          react.crossOrigin = '';
          react.src = 'https://unpkg.com/react@18/umd/react.production.min.js';
          document.body.appendChild(react);

          var reactDom = document.createElement('script');
          reactDom.crossOrigin = '';
          reactDom.src = 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js';
          document.body.appendChild(reactDom);

          var babel = document.createElement('script');
          babel.src = 'https://unpkg.com/@babel/standalone/babel.min.js';
          babel.onload = function () {
            var legacyApp = document.createElement('script');
            legacyApp.type = 'text/babel';
            legacyApp.src = '../assets/js/react-app.js';
            document.body.appendChild(legacyApp);
          };
          document.body.appendChild(babel);
        };
        document.body.appendChild(appBundle);
      })();
    </script>
</body>
</html>
